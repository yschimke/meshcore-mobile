name: No AI agents

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-name:
    name: Reject AI agent branch names
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check head branch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if [[ "$HEAD_REF" =~ ^(claude|copilot|cursor|devin|codex|aider|jules|gemini)/ ]]; then
            echo "::error::Branch '$HEAD_REF' uses an AI agent prefix. Rename to 'agent/...' before opening the PR."
            exit 1
          fi
          echo "Branch name OK: $HEAD_REF"

  co-authors:
    name: Scan commits and PR body
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for AI agent co-authors
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          git fetch --no-tags --prune origin "+$BASE_SHA" "+$HEAD_SHA" || true

          {
            git log --format='%B%n' "$BASE_SHA..$HEAD_SHA"
            printf '%s\n' "$PR_TITLE"
            printf '%s\n' "$PR_BODY"
          } > /tmp/pr-text

          patterns='(claude|anthropic\.com|copilot|openai\.com|chatgpt|cursor\.(com|sh)|devin-ai|codex|aider|sourcegraph\.com|cody-ai|gemini-code|bard|sweep-ai|tabnine|codeium|continue\.dev|replit-ai|amazonq|amazon-q|codewhisperer|qodo|bito-ai|cognition-ai|factory\.ai|jules-ai|noreply@.*-ai|.*-bot@)'

          if grep -inEH "^[[:space:]]*co-authored-by:.*${patterns}" /tmp/pr-text; then
            echo
            echo "::error::Found AI agent attribution in commits or PR body."
            echo "Strip Co-authored-by trailers, AI bot emails, and 'Generated with' lines, then force-push."
            exit 1
          fi

          echo "No AI agent co-authors detected."
