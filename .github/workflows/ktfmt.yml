name: ktfmt

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ktfmt-check:
    name: ktfmtCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run ktfmtCheck
        run: ./gradlew ktfmtCheck --no-configuration-cache
